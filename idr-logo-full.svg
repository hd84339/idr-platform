<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="faceTop2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84D00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceLeft2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D2D2D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceRight2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3A3A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="100" fill="white"/>

  <!-- Cube icon (scaled to fit) -->
  <g transform="translate(8, 5) scale(0.75)">
    <polygon points="60,14 100,37 60,60 20,37" fill="url(#faceTop2)" />
    <polygon points="20,37 60,60 60,100 20,77" fill="url(#faceLeft2)" />
    <polygon points="60,60 100,37 100,77 60,100" fill="url(#faceRight2)" />
    <polygon points="60,24 73,46 47,46" fill="white" opacity="0.95" />
    <rect x="58.5" y="31" width="3" height="9" rx="1.5" fill="#E84D00" />
    <circle cx="60" cy="43" r="1.8" fill="#E84D00" />
    <line x1="60" y1="14" x2="60" y2="60" stroke="white" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Divider line -->
  <rect x="88" y="18" width="1.5" height="64" fill="#E84D00" opacity="0.6"/>

  <!-- IDR wordmark -->
  <text x="100" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" letter-spacing="6" fill="#1A1A1A">IDR</text>

  <!-- Full name -->
  <text x="101" y="68" font-family="'Courier New', Courier, monospace" font-size="11" letter-spacing="2.5" fill="#555555" font-weight="400">INSTITUTE OF DIGITAL RISK</text>
</svg>
